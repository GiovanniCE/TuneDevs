<!--
Standalone login page mockup/prototype for the tuner project; it provides renders the login UI for manual testing or demonstration.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #d1d5db;
      --shadow: 0 10px 30px rgba(31, 41, 55, 0.12);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, #e0ebff 0%, var(--bg) 50%, #eef2ff 100%);
      color: var(--text);
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      border: 1px solid #e5e7eb;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--primary);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.88rem;
    }

    .row a {
      color: var(--primary);
      text-decoration: none;
    }

    .row a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .footer {
      margin-top: 18px;
      font-size: 0.88rem;
      text-align: center;
      color: var(--muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Please sign in to continue</p>

    <form>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" required />
      </div>

      <div class="row">
        <label><input type="checkbox" style="width:auto; margin-right:6px;" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn">Log In</button>
    </form>

    <p class="footer">No account? <a href="#">Create one</a></p>
  </main>
</body>
</html>
