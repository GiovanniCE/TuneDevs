# Configures backend runtime settings such as database, logging, and tuner mode; it provides application configuration used at startup.

spring.application.name=AutoTunerBackend

# MySQL datasource (override via environment variables on Linux machines)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/guitar_tuner}
spring.datasource.username=${DB_USER:tuner_admin}
spring.datasource.password=${DB_PASSWORD:tuner_password}
spring.jpa.hibernate.ddl-auto=none

# browser for local USB interface testing through the frontend
# mock for simulated updates
# hardware for Raspberry Pi / real tuner process
tuner.mode=browser

# Signal input for hardware mode: gpio (default Raspberry Pi) or audio (USB audio interface)
tuner.input=${TUNER_INPUT:gpio}

# Instrument for mock mode: guitar (default) or bass
tuner.instrument=${TUNER_INSTRUMENT:guitar}

# Temporary debug aid: include backend exception message in 4xx/5xx JSON responses.
# This makes root-cause diagnosis possible from frontend network logs.
server.error.include-message=always
