# Configures backend tests with test-safe runtime properties; it provides predictable settings for automated tests.

spring.application.name=AutoTunerBackendTest

# H2 in-memory database for tests (MySQL-compatible mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=false

tuner.mode=mock
tuner.input=gpio
